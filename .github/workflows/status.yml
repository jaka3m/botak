name: 🌐 Update Proxy IP Status

on:
  schedule:
    - cron: '0 0 */3 * *'
  workflow_dispatch:

jobs:
  update-proxies:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📂 Checkout Repository
      uses: actions/checkout@v3

    - name: 🐍 Set Up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 📦 Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install aiohttp

    - name: 🔄 Update Proxy Status
      run: |
        # Menggunakan flag -u agar log muncul secara Real-Time
        python -u ./cek/scan.py

    - name: 📤 Commit and Push Changes
      run: |
        git config --local user.name "github-actions[bot]"
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        
        git add cek/proxyList.txt || true
        git add cek/dead.txt || true

        if git diff --cached --quiet; then
          echo "✅ Tidak ada perubahan."
        else
          git commit -m "🔄 Update Proxy Status [$(date +'%Y-%m-%d %H:%M:%S')]"
          git push
        fi
